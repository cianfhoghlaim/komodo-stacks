name: n8n

services:
  # ---------------------------------------------------------------------------
  # N8N — workflow automation + LLM pipelines
  # ---------------------------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.94.1
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Generic
      N8N_HOST: ${N8N_HOST:-n8n.cianfhoghlaim.ie}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.cianfhoghlaim.ie/}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_METRICS: "true"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "336"   # 14 days
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Dublin}
      N8N_DEFAULT_LOCALE: en
      # Auth / encryption
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      N8N_BASIC_AUTH_ACTIVE: "false"
      # Postgres
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${N8N_POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_POSTGRES_PASSWORD}
      # Queue mode (Redis)
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: n8n-redis
      QUEUE_BULL_REDIS_PORT: "6379"
      # OpenCode Go (LLM backbone)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      # Outbound webhook secret
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      n8n-postgres:
        condition: service_healthy
      n8n-redis:
        condition: service_healthy
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # N8N POSTGRES — workflow history, credentials, executions
  # ---------------------------------------------------------------------------
  n8n-postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_POSTGRES_DB:-n8n}
      POSTGRES_USER: ${N8N_POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_POSTGRES_PASSWORD}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -d $${POSTGRES_DB:-n8n} -U $${POSTGRES_USER:-n8n}"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # N8N REDIS — queue mode (multi-worker scaling)
  # ---------------------------------------------------------------------------
  n8n-redis:
    image: redis:7-alpine
    container_name: n8n-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - n8n_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cianfhoghlaim

volumes:
  n8n_data:
    name: n8n_data
  n8n_postgres_data:
    name: n8n_postgres_data
  n8n_redis_data:
    name: n8n_redis_data

networks:
  cianfhoghlaim:
    driver: bridge
